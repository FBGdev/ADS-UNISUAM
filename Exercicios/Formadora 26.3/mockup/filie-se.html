<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONG Esperanca Viva - Filie-se</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container header-content">
      <h1 class="logo">ONG Esperanca Viva</h1>
      <nav aria-label="Menu principal">
        <ul class="nav-menu">
          <li><a href="home.html">Home</a></li>
          <li><a href="historico.html">Historico</a></li>
          <li><a href="quem-somos.html">Quem Somos</a></li>

        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="section">
        <h2>Filie-se a ONG</h2>
        <p>Se quiser participar, preenche seus dados. Depois a gente entra em contato com calma.</p>
        <form class="form-simple" action="#" method="post">
          <label for="nome">Nome</label>
          <input id="nome" name="nome" type="text" required>

          <label for="email">Email</label>
          <input id="email" name="email" type="email" required>

          <label for="telefone">Telefone</label>
          <input id="telefone" name="telefone" type="tel" required>

          <button class="btn" type="submit">Enviar Cadastro</button>
        </form>
      </section>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Contato: contato@esperancaviva.org | (11) 98888-0000</p>
      <p>Redes sociais: Instagram | Facebook | YouTube</p>
    </div>
  </footer>
</body>
